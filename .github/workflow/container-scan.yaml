
name: Container Security Tool CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Dockerfile scan
        run: |
          echo "Running scan on sample Dockerfile..."
          python3 cli.py --dockerfile ./sample_dockerfile/Dockerfile

      - name: Run Dockerfile scan with remediation
        run: |
          echo "Running scan + remediation..."
          python3 cli.py --dockerfile ./sample_dockerfile/Dockerfile --remediate

      - name: Show remediated Dockerfile
        run: |
          cat Dockerfile.fixed || echo "No remediated file generated"
